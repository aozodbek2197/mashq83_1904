<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>33. BMI Calculator</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 40px; background: #f0f2f5; }
    .card { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 12px; margin: 10px 0; font-size: 18px; }
    button { width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
    #result { margin-top: 20px; font-size: 24px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h1>BMI Kalkulyator</h1>
    <input type="number" id="weight" placeholder="Og‘irligingiz (kg)">
    <input type="number" id="height" placeholder="Bo‘yingiz (sm)">
    <button onclick="calculateBMI()">Hisoblash</button>
    <div id="result"></div>
  </div>

  <script>
    function calculateBMI() {
      const weight = parseFloat(document.getElementById('weight').value);
      const height = parseFloat(document.getElementById('height').value) / 100;

      if (!weight || !height) return alert("Ma'lumotlarni to‘ldiring!");

      const bmi = (weight / (height * height)).toFixed(1);
      let status = '';

      if (bmi < 18.5) status = "Ozgin";
      else if (bmi < 25) status = "Normal";
      else if (bmi < 30) status = "Ortiqcha vazn";
      else status = "Semizlik";

      document.getElementById('result').innerHTML = `
        Sizning BMI: <strong>${bmi}</strong><br>
        Holat: <strong>${status}</strong>
      `;
    }
  </script>
</body>
</html>
